name: Python Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: astral-sh/setup-uv@v5
      with:
        python-version: '3.12'
        enable-cache: true
    - run: uv sync --group test
    - run: branb test
    - uses: codecov/codecov-action@v5
      with:
        fail_ci_if_error: true
